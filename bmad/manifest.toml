[workflow]
name = "bmad"                              # Required: workflow name (matches directory)
version = "1.0.0"                          # Optional: version string
description = "BMAD workflow"              # Optional: description for listings

[[agent]]
name = "bmad-solution-architect"
schedule = ""
readonly = false
timeout = "25m"
prompt_file = "./prompts/SOLUTION_ARCHITECT.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "bmad-sprint-planner"
schedule = "5,35 * * * *"                 # Every 30 min at :05 and :35
readonly = false
timeout = "25m"
prompt_file = "./prompts/SPRINT_PLANNER.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "bmad-dev-1"
schedule = "*/30 * * * *"                 # Every 30 min at :00 and :30
readonly = false
timeout = "30m"
prompt_file = "./prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "1" }

[[agent]]
name = "bmad-dev-2"
schedule = "15,45 * * * *"               # Every 30 min at :15 and :45
readonly = false
timeout = "30m"
prompt_file = "./prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "2" }

[[agent]]
name = "bmad-code-reviewer"
schedule = "20,50 * * * *"               # Every 30 min at :20 and :50
readonly = false
timeout = "20m"
prompt_file = "./prompts/CODE_REVIEWER.md"

[[agent]]
name = "bmad-scrum-master"
schedule = "0 * * * *"                    # Every hour on the hour
readonly = false
timeout = "15m"
prompt_file = "./prompts/SCRUM_MASTER.md"
env = { AGENT_COUNT = "2" }
